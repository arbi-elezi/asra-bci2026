# C7 — Hard Override (Conventional Baseline)
# Hard interrupt at F > 0.8. No weight changes.
# Seeds: 1000
# Purpose: Conventional baseline comparison.

condition: C7
name: "Hard Override"
description: "Conventional hard interrupt at F > 0.8 — no FRA weight adaptation"

environment:
  type: "3d"
  n_lanes: 3
  lane_width: 3.7
  dt: 0.1
  max_steps: 500
  obstacle_density: 18.0
  use_shifted: false
  cost_bias:
    slow: 1.0
    fast: 1.0
    stationary: 1.0

agent:
  type: "ppo_frozen"
  w0_checkpoint: "checkpoints/ppo_base/w0.pt"

fra:
  enabled: false  # No FRA weight changes
  hard_override:
    enabled: true
    threshold: 0.8  # Hard interrupt at F_t > 0.8
    # When F_t > threshold, override action with safe fallback (e.g., brake/decelerate)

seeds:
  experiment: 1000
  start: 0

gpu:
  n_envs: 256
  device: "cuda"

logging:
  save_dir: "results/C7"
  save_config: true
  save_w0_hash: true
  metrics: ["M1", "M8"]
