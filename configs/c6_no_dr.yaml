# C6 — No-DR (Ablation A4)
# DR disabled. SCL + FHR active. All other components active.
# Seeds: 1000 (100 adversarial seeds for H8)
# Purpose: Targeted diagnostic — DR necessity in SCL-inactive regime.
# Isolation: ONLY DR disabled. Everything else identical to C2 (Rule 4).

condition: C6
name: "No-DR"
description: "Deregulator disabled — SCL + FHR active, all other components active"

environment:
  type: "3d"
  n_lanes: 3
  lane_width: 3.7
  dt: 0.1
  max_steps: 500
  obstacle_density: 18.0
  use_shifted: false
  cost_bias:
    slow: 1.0
    fast: 1.0
    stationary: 1.0

agent:
  type: "ppo_frozen"
  w0_checkpoint: "checkpoints/ppo_base/w0.pt"

fra:
  enabled: true
  components:
    dr:
      enabled: false  # CHANGED — DR disabled, this is the ablation
    fhr:
      enabled: true
      type: "fisher"
      eta_h: null
      bc_enabled: true
      eta_bc: null
    fc:
      enabled: true
      frozen: false
      n_ft: null
    td_fear:
      enabled: true
      gamma_f: null
    uncertainty:
      enabled: true
      beta: null
    scl:
      enabled: true
      tau: null
      k: null
    fms:
      enabled: true
    gtcc:
      enabled: true
    rlaf:
      enabled: true
      gate_threshold: 0.70

seeds:
  experiment: 1000
  start: 0

gpu:
  n_envs: 256
  device: "cuda"

logging:
  save_dir: "results/C6"
  save_config: true
  save_w0_hash: true
  metrics: ["M1", "M5", "M8"]
