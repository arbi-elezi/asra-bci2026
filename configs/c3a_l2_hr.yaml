# C3a — L2-HR (Ablation A1a)
# FHR replaced with L2 pullback (no Fisher weighting, no BC)
# Seeds: 1000
# Purpose: Test Fisher+BC vs L2. Only difference from C2: FHR → L2.
# Isolation: ONLY FHR changes. Everything else identical to C2 (Rule 4).

condition: C3a
name: "L2-HR"
description: "L2 pullback homeostatic regulator — no Fisher weighting, no BC"

environment:
  type: "3d"
  n_lanes: 3
  lane_width: 3.7
  dt: 0.1
  max_steps: 500
  obstacle_density: 18.0
  use_shifted: false
  cost_bias:
    slow: 1.0
    fast: 1.0
    stationary: 1.0

agent:
  type: "ppo_frozen"
  w0_checkpoint: "checkpoints/ppo_base/w0.pt"

fra:
  enabled: true
  components:
    dr:
      enabled: true
      eta_f: null  # Set after hyperparameter search
    fhr:
      enabled: true
      type: "l2"  # CHANGED from "fisher" — this is the ablation
      eta_h: null
      bc_enabled: false  # CHANGED — L2 has no BC term
      eta_bc: null
    fc:
      enabled: true
      frozen: false
      n_ft: null
    td_fear:
      enabled: true
      gamma_f: null
    uncertainty:
      enabled: true
      beta: null
    scl:
      enabled: true
      tau: null
      k: null
    fms:
      enabled: true
    gtcc:
      enabled: true
    rlaf:
      enabled: true
      gate_threshold: 0.70

seeds:
  experiment: 1000
  start: 0

gpu:
  n_envs: 256
  device: "cuda"

logging:
  save_dir: "results/C3a"
  save_config: true
  save_w0_hash: true
  metrics: ["M1", "M3", "M8", "M9"]
