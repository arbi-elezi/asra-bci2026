# C8d — Biased Cost Model (×0.2)
# Cost critic from full D_ref, fast-obstacle costs × 0.2 during training
# Seeds: 500
# Purpose: Severe systematic bias stress test

condition: C8d
name: "Biased Cost Model (×0.2)"
description: "Full D_ref, fast-obstacle cost labels × 0.2 — severe systematic bias"

environment:
  type: "3d"
  n_lanes: 3
  lane_width: 3.7
  dt: 0.1
  max_steps: 500
  obstacle_density: 18.0
  use_shifted: false
  # These biases are for CRITIC TRAINING ONLY — true env cost is unbiased
  cost_bias:
    slow: 1.0
    fast: 0.2   # SEVERE BIAS — fast obstacles undercosted
    stationary: 1.0

agent:
  type: "ppo_frozen"
  w0_checkpoint: "checkpoints/ppo_base/w0.pt"

fra:
  enabled: true
  components:
    dr:
      enabled: true
      # Uses biased cost critic — this is the point of the test
      cost_critic_checkpoint: "checkpoints/cost_critic/biased_fast_02.pt"
    fhr:
      enabled: true
      type: "fisher"
      bc_enabled: true
    fc:
      enabled: true
      frozen: false
    td_fear:
      enabled: true
    uncertainty:
      enabled: true
    scl:
      enabled: true
    fms:
      enabled: true
    gtcc:
      enabled: true
    rlaf:
      enabled: true
      gate_threshold: 0.70

seeds:
  experiment: 500  # Stress test uses 500 seeds
  start: 0

gpu:
  n_envs: 256
  device: "cuda"

logging:
  save_dir: "results/C8d"
  save_config: true
  save_w0_hash: true
  metrics: ["M1", "M10", "M10s", "M14"]
